<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator-base">
        <div class="borda-cima">
        </div>
        <div class="tela">
            <input type="text" id="num1" placeholder="0" autocomplete="off">
            <input type="text" id="num2" placeholder="0" autocomplete="off">
        </div>
        <div class="buttons-grid">
            <button id="btnSoma" class="btn orange">+</button>
            <button id="btnSub" class="btn orange">-</button>
            <button id="btnMult" class="btn orange">×</button>
            <button id="btnDiv" class="btn orange">÷</button>
            <button id="btnLimpar" class="btn dark-gray">C</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
